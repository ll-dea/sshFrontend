<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css"
          rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <title>Florist Booking</title>
</head>
<body>
    <!-- SIDEBAR -->
    <section id="sidebar">
        <a href="index.html" class="brand">
            <i class="bx bxs-smile"></i>
            <span class="text">EventPlanner</span>
        </a>
        <ul class="side-menu top">
            <li class="active">
                <a href="index.html">
                    <i class="bx bxs-dashboard"></i>
                    <span class="text">Dashboard</span>
                </a>
            </li>
            <li>
                <a href="florist.html">
                    <i class="bx bxs-shopping-bag-alt"></i>
                    <span class="text">Florist</span>
                </a>
            </li>
            <!-- Other menu items -->
        </ul>
    </section>
    <!-- SIDEBAR -->
    <!-- CONTENT -->
    <section id="content">
        <nav>
            <i class="bx bx-menu"></i>
            <a href="#" class="nav-link">Categories</a>
            <form action="#">
                <div class="form-input">
                    <input type="search" placeholder="Search..." />
                    <button type="submit" class="search-btn">
                        <i class="bx bx-search"></i>
                    </button>
                </div>
            </form>
            <!-- Notifications and Profile -->
        </nav>

        <main>
            <!-- Florist Section with Cards -->
            <div class="florist-section">
                <div class="florist-list">
                    <!-- Florist Card 1 -->
                    <div class="florist-card">
                        <img src="img/f1.jpg" alt="Floral Boutique" class="florist-img" />
                        <div class="florist-info">
                            <h4>Floral Boutique</h4>
                            <button class="book-btn">Book</button>
                        </div>
                    </div>

                    <!-- Florist Card 2 -->
                    <div class="florist-card">
                        <img src="img/f2.webp"
                             alt="Blooming Garden"
                             class="florist-img" />
                        <div class="florist-info">
                            <h4>Blooming Garden</h4>
                            <button class="book-btn">Book</button>
                        </div>
                    </div>

                    <!-- Florist Card 3 -->
                    <div class="florist-card">
                        <img src="img/f2.jpg" alt="Petal Paradise" class="florist-img" />
                        <div class="florist-info">
                            <h4>Petal Paradise</h4>
                            <button class="book-btn">Book</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Modal for booking -->
            <div class="booking-modal" id="bookingModal" style="display: none">
                <div class="modal-content">
                    <h3>Book a Florist</h3>
                    <label for="date">Select Date:</label>
                    <input type="date" id="date" />
                    <label for="time">Select Time:</label>
                    <input type="time" id="time" />
                    <button id="confirmBooking">Confirm Booking</button>
                    <button id="closeModal">Close</button>
                </div>
            </div>
        </main>
    </section>
    <script>
        // Show the booking modal when "Book" button is clicked
        document.querySelectorAll(".book-btn").forEach(function (button) {
            button.addEventListener("click", function () {
                // Merr emrin e floristit nga karta ku është klikuar butoni
                const floristCard = button.closest(".florist-card");
                const floristName =
                    floristCard.querySelector(".florist-info h4").innerText;

                // Ruaj emrin e floristit për më vonë (do përdoret gjatë konfirmimit)
                localStorage.setItem("selectedFlorist", floristName);

                // Shfaq modalin
                document.getElementById("bookingModal").style.display = "flex";
            });
        });

        // Mbyll modalin kur klikohet "Close"
        document
            .getElementById("closeModal")
            .addEventListener("click", function () {
                document.getElementById("bookingModal").style.display = "none";
            });

        // Kur përdoruesi konfirmon rezervimin
        document
            .getElementById("confirmBooking")
            .addEventListener("click", function () {
                const date = document.getElementById("date").value;
                const time = document.getElementById("time").value;
                const floristName = localStorage.getItem("selectedFlorist");

                if (date && time && floristName) {
                    const newOrder = {
                        florist: floristName,
                        date: date,
                        time: time,
                        status: "Pending", // ose "Completed" si të duash
                    };

                    // Merr rezervimet ekzistuese nga localStorage ose krijo listë të re
                    const existingOrders =
                        JSON.parse(localStorage.getItem("recentOrders")) || [];

                    // Shto rezervimin e ri
                    existingOrders.push(newOrder);

                    // Ruaje sërish në localStorage
                    localStorage.setItem(
                        "recentOrders",
                        JSON.stringify(existingOrders)
                    );

                    alert(
                        "Booking confirmed for " +
                        date +
                        " at " +
                        time +
                        " with " +
                        floristName
                    );

                    // Mbyll modalin
                    document.getElementById("bookingModal").style.display = "none";
                } else {
                    alert("Please select both a date and time!");
                }
            });
    </script>

    <script src="script.js"></script>
    <script type="module" src="controllers/floristController.js"></script>

</body>
</html>
