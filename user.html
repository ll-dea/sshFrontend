<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Boxicons -->
  <link href="https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css" rel="stylesheet" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css" />

  <title>EventPlanner - User Dashboard</title>
</head>
<body>

  <!-- SIDEBAR -->
  <section id="sidebar">
    <a href="user.html" class="brand">
      <i class="bx bxs-smile"></i>
      <span class="text">EventPlanner</span>
    </a>
    <ul class="side-menu top">
      <li class="active">
        <a href="user.html">
          <i class="bx bxs-dashboard"></i>
          <span class="text">Dashboard</span>
        </a>
      </li>
      <li>
        <a href="my-event.html">
          <i class="bx bxs-calendar-event"></i>
          <span class="text">My Events</span>
        </a>
      </li>
      <li>
        <a href="my-bookings.html">
          <i class="bx bxs-book-content"></i>
          <span class="text">My Bookings</span>
        </a>
      </li>
    </ul>
    <ul class="side-menu">
      <li>
        <a href="#" class="logout">
          <i class="bx bxs-log-out-circle"></i>
          <span class="text">Logout</span>
        </a>
      </li>
    </ul>
  </section>
  <!-- SIDEBAR -->

  <!-- CONTENT -->
  <section id="content">
    <!-- NAVBAR -->
    <nav>
      <i class="bx bx-menu"></i>
      <a href="#" class="nav-link">My Dashboard</a>
      <form action="#">
        <div class="form-input">
          <input type="search" placeholder="Search..." />
          <button type="submit" class="search-btn">
            <i class="bx bx-search"></i>
          </button>
        </div>
      </form>
      <input type="checkbox" id="switch-mode" hidden />
      <label for="switch-mode" class="switch-mode"></label>
    </nav>
    <!-- NAVBAR -->

    <!-- MAIN -->
    <main>
      <div class="head-title">
        <div class="left">
          <h1>User Dashboard</h1>
          <ul class="breadcrumb">
            <li><a href="user.html">Dashboard</a></li>
            <li><i class="bx bx-chevron-right"></i></li>
            <li><a class="active" href="#">My Events</a></li>
          </ul>
        </div>
      </div>

      <!-- Add Event Button -->
      <div class="add-event-section" style="margin-bottom: 1rem;">
        <button id="openModalBtn" class="btn-add-event">+ Add Event</button>
      </div>

      <!-- Table Section -->
      <div class="table-data">
        <div class="order">
          <div class="head">
            <h3>Upcoming Events</h3>
            <i class="bx bx-search"></i>
            <i class="bx bx-filter"></i>
          </div>
          <table>
            <thead>
              <tr>
                <th>Event Name</th>
                <th>Event Type</th> 
                <th>Date</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="recentOrders">
            </tbody>
          </table>
        </div>

        <div class="order">
          <div class="head">
            <h3>Booked Vendors</h3>
            <i class="bx bx-search"></i>
            <i class="bx bx-filter"></i>
          </div>
          <table>
            <thead>
              <tr>
                <th>Vendor</th>
                <th>Category</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Blooming Garden</td>
                <td>Florist</td>
                <td><span class="status completed">Confirmed</span></td>
              </tr>
              <tr>
                <td>Sweet Treats</td>
                <td>Pastry</td>
                <td><span class="status pending">Pending</span></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
    <!-- MAIN -->
  </section>
  <!-- CONTENT -->

  <!-- Add Event Modal -->
  <div id="addEventModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Create New Event</h2>
      <form id="addEventForm">
        <label for="eventName">Event Name</label>
        <input type="text" id="eventName" name="eventName" required />

        <label for="eventDate">Event Date</label>
        <input type="datetime-local" id="eventDate" name="eventDate" required />

        <label for="eventTypeId">Event Type</label>
        <select id="eventTypeId" name="eventTypeId">
          <option value="1">Wedding</option>
          <option value="2">Birthday</option>
          <option value="3">Conference</option>
        </select>

        <button type="submit" class="btn-submit">Create Event</button>
      </form>
    </div>
  </div>

  <!-- JS -->
  <script src="script.js"></script>
</body>
</html>
