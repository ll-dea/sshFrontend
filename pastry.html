<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css"
          rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <title>Pastry Booking</title>
</head>
<body>
    <!-- SIDEBAR -->
    <section id="sidebar">
        <a href="index.html" class="brand">
            <i class="bx bxs-smile"></i>
            <span class="text">EventPlanner</span>
        </a>
        <ul class="side-menu top">
            <li class="active">
                <a href="index.html">
                    <i class="bx bxs-dashboard"></i>
                    <span class="text">Dashboard</span>
                </a>
            </li>
            <li>
                <a href="pastry.html">
                    <i class="bx bxs-cookie"></i>
                    <span class="text">Pastry</span>
                </a>
            </li>
            <!-- Other menu items -->
        </ul>
    </section>
    <!-- SIDEBAR -->
    <!-- CONTENT -->
    <section id="content">
        <nav>
            <i class="bx bx-menu"></i>
            <a href="#" class="nav-link">Categories</a>
            <form action="#">
                <div class="form-input">
                    <input type="search" placeholder="Search..." />
                    <button type="submit" class="search-btn">
                        <i class="bx bx-search"></i>
                    </button>
                </div>
            </form>
        </nav>

        <main>
            <!-- Pastry Section with Cards -->
            <div class="pastry-section">
                <div class="pastry-list">
                    <!-- Pastry Card 1 -->
                    <div class="pastry-card">
                        <img src="img/p1.png" alt="Sweet Treats" class="pastry-img" />
                        <div class="pastry-info">
                            <h4>Sweet Treats</h4>
                            <button class="book-btn">Book</button>
                        </div>
                    </div>

                    <!-- Pastry Card 2 -->
                    <div class="pastry-card">
                        <img src="img/p2.png" alt="Cake Haven" class="pastry-img" />
                        <div class="pastry-info">
                            <h4>Cake Haven</h4>
                            <button class="book-btn">Book</button>
                        </div>
                    </div>

                    <!-- Pastry Card 3 -->
                    <div class="pastry-card">
                        <img src="img/p3.png" alt="Dough Delight" class="pastry-img" />
                        <div class="pastry-info">
                            <h4>Dough Delight</h4>
                            <button class="book-btn">Book</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Modal for booking -->
            <div class="booking-modal" id="bookingModal" style="display: none">
                <div class="modal-content">
                    <h3>Book a Pastry</h3>
                    <label for="date">Select Date:</label>
                    <input type="date" id="date" />
                    <label for="time">Select Time:</label>
                    <input type="time" id="time" />
                    <button id="confirmBooking">Confirm Booking</button>
                    <button id="closeModal">Close</button>
                </div>
            </div>
        </main>
    </section>

    <script>
      // Show the booking modal when "Book" button is clicked
      document.querySelectorAll(".book-btn").forEach(function (button) {
        button.addEventListener("click", function () {
          const card = button.closest(".pastry-card");
          const pastryName = card.querySelector(".pastry-info h4").innerText;

          localStorage.setItem("selectedPastry", pastryName);
          document.getElementById("bookingModal").style.display = "flex";
        });
      });

      // Close modal
      document
        .getElementById("closeModal")
        .addEventListener("click", function () {
          document.getElementById("bookingModal").style.display = "none";
        });

      // Confirm booking
      document
        .getElementById("confirmBooking")
        .addEventListener("click", function () {
          const date = document.getElementById("date").value;
          const time = document.getElementById("time").value;
          const pastryName = localStorage.getItem("selectedPastry");

          if (date && time && pastryName) {
            const newOrder = {
              pastry: pastryName,
              date: date,
              time: time,
              status: "Pending",
            };

            const existingOrders =
              JSON.parse(localStorage.getItem("recentOrders")) || [];

            existingOrders.push(newOrder);

            localStorage.setItem(
              "recentOrders",
              JSON.stringify(existingOrders)
            );

            alert(
              "Booking confirmed for " +
                date +
                " at " +
                time +
                " with " +
                pastryName
            );

            document.getElementById("bookingModal").style.display = "none";
          } else {
            alert("Please select both a date and time!");
          }
        });
    </script>

    <script src="script.js"></script>
</body>
</html>
